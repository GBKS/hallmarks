name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages needs these permissions on the workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time; let it finish rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build hallmark.js from hallmark.ts
        run: npm run build

      - name: Run render test (smoke check)
        run: npm run test-render

      - name: Stage _site directory
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            ./ _site/
          # Disable Jekyll's default file-name processing so files starting with
          # _ or . are served as-is.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
